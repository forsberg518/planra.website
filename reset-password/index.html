<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tilbakestill passord – Planra</title>
  <link rel="icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D0E14;
      --card:      #1A1B24;
      --border:    #343548;
      --input-bg:  #252635;
      --primary:   #5B8AFF;
      --primary-h: #4A78F0;
      --text-1:    #F2F2F7;
      --text-2:    #8E8E93;
      --error:     #FF5F5F;
      --success:   #34C759;
      --radius-card: 16px;
      --radius-btn:  12px;
      --radius-input: 10px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--text-1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background glow orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 480px;
      height: 480px;
      top: -120px;
      left: -100px;
      background: radial-gradient(circle, rgba(91,138,255,0.07) 0%, transparent 70%);
    }
    body::after {
      width: 360px;
      height: 360px;
      bottom: -80px;
      right: -60px;
      background: radial-gradient(circle, rgba(91,138,255,0.05) 0%, transparent 70%);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 36px 32px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 24px 64px rgba(0,0,0,0.5),
        0 1px 0 rgba(255,255,255,0.06) inset;
      animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .logo-wrap img {
      height: 36px;
      width: auto;
    }

    /* Headings */
    .heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
      text-align: center;
      letter-spacing: -0.3px;
      animation: fadeUp 0.5s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .subheading {
      font-size: 13.5px;
      color: var(--text-2);
      text-align: center;
      margin-top: 6px;
      line-height: 1.5;
      animation: fadeUp 0.5s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Form */
    .form {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.5s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .field:nth-child(2) { animation-delay: 0.3s; }

    label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 48px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-input);
      color: var(--text-1);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 0 44px 0 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,138,255,0.15);
    }
    input::placeholder { color: rgba(142,142,147,0.6); }

    .toggle-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--text-2);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-btn:hover { color: var(--text-1); }

    /* Strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .strength-seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--input-bg);
      transition: background 0.3s;
    }
    .strength-seg.weak   { background: #FF5F5F; }
    .strength-seg.medium { background: #FF9F0A; }
    .strength-seg.strong { background: #34C759; }

    /* Match indicator */
    .match-hint {
      font-size: 12px;
      color: var(--text-2);
      min-height: 16px;
      transition: color 0.2s;
    }
    .match-hint.ok    { color: var(--success); }
    .match-hint.error { color: var(--error); }

    /* Button */
    .btn {
      margin-top: 8px;
      height: 50px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(91,138,255,0.3);
      animation: fadeUp 0.5s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }
    .btn:hover:not(:disabled) {
      background: var(--primary-h);
      box-shadow: 0 6px 24px rgba(91,138,255,0.4);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status messages */
    .status {
      display: none;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.45;
      animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .status.error {
      display: flex;
      gap: 8px;
      background: rgba(255,95,95,0.1);
      border: 1px solid rgba(255,95,95,0.25);
      color: #FF8080;
    }
    .status.success {
      display: flex;
      gap: 8px;
      flex-direction: column;
      background: rgba(52,199,89,0.1);
      border: 1px solid rgba(52,199,89,0.25);
      color: #4CD964;
      text-align: center;
      align-items: center;
    }
    .status.success .success-icon {
      width: 40px;
      height: 40px;
      background: rgba(52,199,89,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Missing token state */
    .token-missing {
      text-align: center;
      animation: fadeUp 0.5s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .token-missing .icon {
      width: 52px;
      height: 52px;
      background: rgba(255,95,95,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .token-missing p {
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 8px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/planra-logo.png" alt="Planra" />
    </div>

    <!-- Content injected by JS based on URL state -->
    <div id="app"></div>
  </div>

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // ─── CONFIG ─────────────────────────────────────────────────────────────
    const SUPABASE_URL  = 'https://zmpsxmjichqlccbykxkh.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptcHN4bWppY2hxbGNjYnlreGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDc4ODMsImV4cCI6MjA4NzYyMzg4M30.fIIOeYbxqw34MAmRG21nKIjzphRdFvU4pzNFOPAJros';
    // ────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const app = document.getElementById('app');

    // Parse hash fragment for Supabase recovery tokens
    function parseHash() {
      const h = window.location.hash.replace(/^#/, '');
      const p = new URLSearchParams(h);
      return {
        access_token:  p.get('access_token'),
        refresh_token: p.get('refresh_token'),
        type:          p.get('type'),
      };
    }

    // Also check query string (PKCE flow)
    function parseQuery() {
      const p = new URLSearchParams(window.location.search);
      return {
        code: p.get('code'),
        type: p.get('type'),
      };
    }

    async function init() {
      const hash  = parseHash();
      const query = parseQuery();

      // PKCE flow: Supabase sends ?code=xxx (type param may or may not be present)
      if (query.code) {
        const { error } = await sb.auth.exchangeCodeForSession(window.location.href);
        if (!error) { renderForm(); return; }
      }

      // Implicit flow: tokens in hash fragment
      if (hash.access_token) {
        const { error } = await sb.auth.setSession({
          access_token:  hash.access_token,
          refresh_token: hash.refresh_token,
        });
        if (!error) { renderForm(); return; }
      }

      // Listen for PASSWORD_RECOVERY event (some Supabase configurations)
      const authPromise = new Promise((resolve) => {
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
            subscription.unsubscribe();
            resolve(true);
          }
        });
        // Timeout after 3s to avoid hanging
        setTimeout(() => resolve(false), 3000);
      });

      // Also check for existing session
      const { data: { session } } = await sb.auth.getSession();
      if (session) { renderForm(); return; }

      const recovered = await authPromise;
      if (recovered) { renderForm(); return; }

      // No valid token found
      renderMissingToken();
    }

    function renderMissingToken() {
      app.innerHTML = `
        <div class="token-missing">
          <div class="icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF8080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <h2 class="heading" style="margin:0">Ugyldig lenke</h2>
          <p>Lenken er utløpt eller ugyldig. Åpne Planra-appen og be om en ny tilbakestillingslenke.</p>
        </div>
      `;
    }

    function renderForm() {
      app.innerHTML = `
        <h2 class="heading">Nytt passord</h2>
        <p class="subheading">Velg et sterkt passord for Planra-kontoen din.</p>

        <form class="form" id="reset-form" novalidate>
          <div class="field">
            <label for="pw1">Nytt passord</label>
            <div class="input-wrap">
              <input type="password" id="pw1" placeholder="Minst 8 tegn" autocomplete="new-password" />
              <button type="button" class="toggle-btn" onclick="toggleVis('pw1', this)" aria-label="Vis passord">
                ${eyeIcon()}
              </button>
            </div>
            <div class="strength-bar" id="strength-bar">
              <div class="strength-seg" id="s1"></div>
              <div class="strength-seg" id="s2"></div>
              <div class="strength-seg" id="s3"></div>
              <div class="strength-seg" id="s4"></div>
            </div>
          </div>

          <div class="field">
            <label for="pw2">Gjenta passord</label>
            <div class="input-wrap">
              <input type="password" id="pw2" placeholder="Skriv passordet på nytt" autocomplete="new-password" />
              <button type="button" class="toggle-btn" onclick="toggleVis('pw2', this)" aria-label="Vis passord">
                ${eyeIcon()}
              </button>
            </div>
            <span class="match-hint" id="match-hint"></span>
          </div>

          <div class="status" id="status-msg"></div>

          <button type="submit" class="btn" id="submit-btn">
            <span class="btn-text">Lagre nytt passord</span>
            <div class="spinner"></div>
          </button>
        </form>
      `;

      const pw1  = document.getElementById('pw1');
      const pw2  = document.getElementById('pw2');
      const hint = document.getElementById('match-hint');
      const btn  = document.getElementById('submit-btn');

      pw1.addEventListener('input', () => updateStrength(pw1.value));
      pw2.addEventListener('input', () => updateMatch(pw1.value, pw2.value, hint));

      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = pw1.value, p2 = pw2.value;

        if (p1.length < 8) { showStatus('error', 'Passordet må være minst 8 tegn.'); return; }
        if (p1 !== p2)     { showStatus('error', 'Passordene stemmer ikke overens.'); return; }

        btn.classList.add('loading');
        btn.disabled = true;
        clearStatus();

        const { error } = await sb.auth.updateUser({ password: p1 });

        btn.classList.remove('loading');
        btn.disabled = false;

        if (error) {
          showStatus('error', error.message || 'Noe gikk galt. Prøv igjen.');
        } else {
          showSuccess();
        }
      });
    }

    function updateStrength(val) {
      let score = 0;
      if (val.length >= 8)               score++;
      if (val.length >= 12)              score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9!@#$%^&*]/.test(val))    score++;

      const classes = ['', 'weak', 'medium', 'medium', 'strong'];
      const segments = [document.getElementById('s1'), document.getElementById('s2'),
                        document.getElementById('s3'), document.getElementById('s4')];
      segments.forEach((seg, i) => {
        seg.className = 'strength-seg';
        if (i < score && val.length > 0) seg.classList.add(score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong');
      });
    }

    function updateMatch(p1, p2, hint) {
      if (!p2) { hint.textContent = ''; hint.className = 'match-hint'; return; }
      if (p1 === p2) { hint.textContent = 'Passordene stemmer overens'; hint.className = 'match-hint ok'; }
      else           { hint.textContent = 'Passordene stemmer ikke'; hint.className = 'match-hint error'; }
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status-msg');
      const icon = type === 'error'
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
        : '';
      el.className = `status ${type}`;
      el.innerHTML = icon + `<span>${msg}</span>`;
    }

    function clearStatus() {
      const el = document.getElementById('status-msg');
      el.className = 'status';
      el.innerHTML = '';
    }

    function showSuccess() {
      app.innerHTML = `
        <div class="status success" style="display:flex; margin-top: 4px;">
          <div class="success-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <strong style="font-size:16px;color:#F2F2F7">Passord oppdatert!</strong>
          <span style="color:#8E8E93;font-size:13.5px;line-height:1.5">Passordet ditt er endret. Du kan nå logge inn i Planra-appen med det nye passordet.</span>
        </div>
      `;
    }

    function toggleVis(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      btn.innerHTML = isPass ? eyeOffIcon() : eyeIcon();
    }

    function eyeIcon() {
      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>`;
    }
    function eyeOffIcon() {
      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>`;
    }

    init();
  </script>
</body>
</html>
